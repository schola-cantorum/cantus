<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cantus · interactive manual</title>
<style>
/* ============================================================
   cantus interactive manual
   Single self-contained artifact. No external resources.
   System font stack only. One accent color (ink-teal).
   ============================================================ */

:root {
  /* warm-neutral paper palette */
  --paper:        oklch(98.6% 0.004 95);
  --paper-sunk:   oklch(96.4% 0.006 95);
  --panel:        oklch(99.6% 0.002 95);
  --ink:          oklch(24% 0.02 250);
  --ink-soft:     oklch(42% 0.018 250);
  --ink-faint:    oklch(58% 0.015 250);
  --rule:         oklch(89% 0.01 95);
  --rule-strong:  oklch(82% 0.012 95);

  /* the one accent */
  --accent:       oklch(48% 0.10 215);
  --accent-soft:  oklch(48% 0.10 215 / 0.10);
  --accent-line:  oklch(48% 0.10 215 / 0.35);

  /* kind hues — desaturated, used as quiet chips not loud fills */
  --k-protocol:   oklch(55% 0.085 255);
  --k-hook:       oklch(56% 0.085 50);
  --k-module:     oklch(52% 0.06 150);
  --k-core:       oklch(50% 0.09 320);

  --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
  --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;

  --maxw: 1280px;
  --radius: 7px;
  --speed: 180ms;
}

@media (prefers-color-scheme: dark) {
  :root {
    --paper:        oklch(20% 0.012 255);
    --paper-sunk:   oklch(17% 0.012 255);
    --panel:        oklch(23.5% 0.014 255);
    --ink:          oklch(93% 0.006 95);
    --ink-soft:     oklch(78% 0.01 95);
    --ink-faint:    oklch(62% 0.012 95);
    --rule:         oklch(31% 0.014 255);
    --rule-strong:  oklch(40% 0.016 255);
    --accent:       oklch(74% 0.11 210);
    --accent-soft:  oklch(74% 0.11 210 / 0.14);
    --accent-line:  oklch(74% 0.11 210 / 0.42);
    --k-protocol:   oklch(74% 0.09 250);
    --k-hook:       oklch(76% 0.10 55);
    --k-module:     oklch(74% 0.08 155);
    --k-core:       oklch(76% 0.10 320);
  }
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 15px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; text-underline-offset: 3px; }

:focus-visible {
  outline: 2px solid var(--accent);
  outline-offset: 2px;
  border-radius: 3px;
}

p { text-wrap: pretty; }

/* ---------- shell ---------- */

.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 clamp(16px, 4vw, 40px); }

header.site {
  border-bottom: 1px solid var(--rule);
  background: var(--panel);
  position: sticky;
  top: 0;
  z-index: 30;
}
.site-row {
  display: flex;
  align-items: baseline;
  gap: 18px 24px;
  flex-wrap: wrap;
  padding: 18px 0 16px;
}
.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-right: auto;
}
.brand .mark {
  font-family: var(--mono);
  font-weight: 600;
  font-size: 21px;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.brand .mark b { color: var(--accent); font-weight: 600; }
.brand .ver {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-faint);
  border: 1px solid var(--rule-strong);
  border-radius: 100px;
  padding: 1px 9px;
  transform: translateY(-1px);
}
.tagline {
  color: var(--ink-soft);
  font-size: 14px;
  letter-spacing: 0.01em;
}
.backlink {
  font-size: 13px;
  color: var(--ink-soft);
  white-space: nowrap;
}
.backlink:hover { color: var(--accent); }

/* segmented view toggle */
.viewtoggle {
  display: inline-flex;
  background: var(--paper-sunk);
  border: 1px solid var(--rule-strong);
  border-radius: 100px;
  padding: 3px;
  gap: 2px;
}
.viewtoggle button {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--ink-soft);
  font: inherit;
  font-size: 13px;
  font-weight: 500;
  padding: 5px 15px;
  border-radius: 100px;
  cursor: pointer;
  transition: color var(--speed), background var(--speed);
}
.viewtoggle button[aria-selected="true"] {
  background: var(--panel);
  color: var(--ink);
  box-shadow: 0 1px 2px oklch(0% 0 0 / 0.10);
}
.viewtoggle button:hover:not([aria-selected="true"]) { color: var(--ink); }

main { padding: 26px 0 80px; }

.colmain {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
  gap: clamp(20px, 3vw, 38px);
  align-items: start;
}
@media (max-width: 960px) {
  .colmain { grid-template-columns: minmax(0, 1fr); }
}

/* ---------- intro line above the map ---------- */
.maphead {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.maphead h2 {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.13em;
  color: var(--ink-faint);
  font-weight: 600;
  margin: 0;
}

/* legend */
.legend { display: flex; gap: 16px; flex-wrap: wrap; }
.legend .item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-size: 12.5px;
  color: var(--ink-soft);
}
.legend .swatch {
  width: 11px; height: 11px;
  border-radius: 3px;
  border: 1px solid currentColor;
  background: color-mix(in oklch, currentColor 18%, transparent);
}
.legend .protocol { color: var(--k-protocol); }
.legend .hook     { color: var(--k-hook); }
.legend .module   { color: var(--k-module); }
.legend .core     { color: var(--k-core); }

/* ---------- layer bands ---------- */
.layers { display: flex; flex-direction: column; gap: 14px; }

.band {
  background: var(--panel);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}
.band-head {
  display: flex;
  align-items: baseline;
  gap: 12px;
  padding: 13px 16px 11px;
  border-bottom: 1px solid var(--rule);
  background: var(--paper-sunk);
}
.band-head .idx {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  border: 1px solid var(--accent-line);
  border-radius: 4px;
  padding: 1px 6px;
  flex: none;
}
.band-head .name { font-weight: 600; font-size: 15px; letter-spacing: -0.005em; }
.band-head .blurb {
  color: var(--ink-faint);
  font-size: 13px;
  line-height: 1.45;
}
@media (max-width: 600px) {
  .band-head { flex-wrap: wrap; }
  .band-head .blurb { flex-basis: 100%; }
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(196px, 1fr));
  gap: 10px;
  padding: 14px 16px 16px;
}

/* node card */
.card {
  --kc: var(--ink-faint);
  text-align: left;
  appearance: none;
  font: inherit;
  cursor: pointer;
  background: var(--panel);
  border: 1px solid var(--rule-strong);
  border-radius: 6px;
  padding: 11px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 5px;
  position: relative;
  transition: border-color var(--speed), background var(--speed), transform var(--speed);
}
.card::before {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: 6px;
  border: 1.5px solid transparent;
  pointer-events: none;
  transition: border-color var(--speed);
}
.card:hover { background: var(--paper-sunk); transform: translateY(-1px); }
.card[data-kind="protocol"] { --kc: var(--k-protocol); }
.card[data-kind="hook"]     { --kc: var(--k-hook); }
.card[data-kind="module"]   { --kc: var(--k-module); }
.card[data-kind="core"]     { --kc: var(--k-core); }

.card .ctop { display: flex; align-items: center; gap: 8px; }
.card .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--kc);
  flex: none;
}
.card .clabel { font-weight: 600; font-size: 14px; letter-spacing: -0.005em; }
.card .ckind {
  margin-left: auto;
  font-size: 10.5px;
  font-family: var(--mono);
  color: var(--kc);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.card .cblurb {
  color: var(--ink-faint);
  font-size: 12.5px;
  line-height: 1.42;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* selected / active states */
.card[aria-pressed="true"]::before { border-color: var(--accent); }
.card[aria-pressed="true"] { background: var(--accent-soft); }

.card.is-step::before { border-color: var(--kc); }
.card.is-step {
  background: color-mix(in oklch, var(--kc) 9%, var(--panel));
  animation: pulse 1.1s ease-out 1;
}
.card.is-related::before { border-color: var(--accent-line); }

@keyframes pulse {
  0%   { box-shadow: 0 0 0 0 color-mix(in oklch, var(--kc) 45%, transparent); }
  100% { box-shadow: 0 0 0 9px transparent; }
}
@media (prefers-reduced-motion: reduce) {
  .card, .card::before, .viewtoggle button, .detail, .panel-card { transition: none; }
  .card:hover { transform: none; }
  .card.is-step { animation: none; }
  html { scroll-behavior: auto; }
}
@media (prefers-reduced-motion: no-preference) {
  html { scroll-behavior: smooth; }
}

/* ---------- right rail ---------- */
.rail { position: sticky; top: 92px; }
@media (max-width: 960px) {
  .rail { position: static; top: auto; }
}

.panel-card {
  background: var(--panel);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}

/* detail panel */
.detail .d-head {
  padding: 16px 18px 14px;
  border-bottom: 1px solid var(--rule);
}
.detail .d-kindrow { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.detail .d-dot { width: 9px; height: 9px; border-radius: 50%; }
.detail .d-kind {
  font-family: var(--mono);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
}
.detail h3 { margin: 0; font-size: 19px; letter-spacing: -0.01em; line-height: 1.2; }
.detail .d-path {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink-soft);
  margin-top: 6px;
  word-break: break-all;
}

.detail .d-body { padding: 14px 18px 18px; }
.detail .d-blurb { color: var(--ink-soft); font-size: 13.5px; margin: 0 0 4px; }

.d-section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--ink-faint);
  font-weight: 600;
  margin: 18px 0 8px;
}

.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  font-family: var(--mono);
  font-size: 11.5px;
  color: var(--ink-soft);
  background: var(--paper-sunk);
  border: 1px solid var(--rule-strong);
  border-radius: 4px;
  padding: 2px 7px;
}

.rels { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 4px; }
.rel {
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 4px 7px;
  width: 100%;
  text-align: left;
  appearance: none;
  font: inherit;
  background: transparent;
  border: 1px solid transparent;
  border-radius: 5px;
  padding: 6px 8px;
  cursor: pointer;
  color: var(--ink);
  transition: background var(--speed), border-color var(--speed);
}
.rel:hover { background: var(--paper-sunk); border-color: var(--rule); }
.rel .arrow { color: var(--ink-faint); font-family: var(--mono); font-size: 12px; }
.rel .verb {
  color: var(--ink-faint);
  font-size: 11.5px;
  font-style: italic;
}
.rel .peer { font-weight: 600; font-size: 13px; color: var(--accent); }
.rel.in .peer { color: var(--ink); }

.rel-empty { color: var(--ink-faint); font-size: 13px; font-style: italic; padding: 2px 8px; }

/* empty detail state */
.detail-empty {
  padding: 26px 20px;
  color: var(--ink-faint);
  font-size: 13.5px;
  line-height: 1.55;
}
.detail-empty strong { color: var(--ink-soft); font-weight: 600; }

/* ---------- scenario panel ---------- */
.scen .s-head { padding: 16px 18px 14px; border-bottom: 1px solid var(--rule); }
.scen .s-head h3 {
  margin: 0 0 12px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--ink-faint);
  font-weight: 600;
}
.scen-select {
  display: flex; flex-direction: column; gap: 6px;
}
.scen-opt {
  text-align: left;
  appearance: none;
  font: inherit;
  cursor: pointer;
  background: var(--panel);
  border: 1px solid var(--rule-strong);
  border-radius: 6px;
  padding: 9px 11px;
  color: var(--ink);
  transition: border-color var(--speed), background var(--speed);
}
.scen-opt:hover { background: var(--paper-sunk); }
.scen-opt[aria-pressed="true"] { border-color: var(--accent); background: var(--accent-soft); }
.scen-opt .so-title { font-weight: 600; font-size: 13.5px; display: block; }
.scen-opt .so-blurb {
  color: var(--ink-faint); font-size: 12px; line-height: 1.4; margin-top: 2px;
  display: -webkit-box; -webkit-line-clamp: 2; line-clamp: 2;
  -webkit-box-orient: vertical; overflow: hidden;
}

.scen-run { padding: 15px 18px 18px; }
.scen-run .sr-blurb { color: var(--ink-soft); font-size: 13px; margin: 0 0 14px; }

.stepper { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.stepper button {
  appearance: none;
  font: inherit;
  cursor: pointer;
  background: var(--panel);
  border: 1px solid var(--rule-strong);
  color: var(--ink);
  border-radius: 6px;
  width: 34px; height: 34px;
  font-size: 16px;
  line-height: 1;
  display: inline-flex; align-items: center; justify-content: center;
  transition: background var(--speed), border-color var(--speed);
}
.stepper button:hover:not(:disabled) { background: var(--paper-sunk); border-color: var(--accent-line); }
.stepper button:disabled { opacity: 0.4; cursor: default; }
.stepper .count {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink-soft);
  flex: 1;
  text-align: center;
}
.stepper .count b { color: var(--ink); }

/* progress ticks */
.ticks { display: flex; gap: 4px; margin-bottom: 14px; }
.tick {
  flex: 1; height: 4px; border-radius: 2px;
  background: var(--rule-strong);
  transition: background var(--speed);
}
.tick.done { background: var(--accent-line); }
.tick.now  { background: var(--accent); }

.stepcard {
  background: var(--paper-sunk);
  border: 1px solid var(--rule);
  border-radius: 6px;
  padding: 12px 13px;
}
.stepcard .sc-node {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
}
.stepcard .sc-dot { width: 8px; height: 8px; border-radius: 50%; }
.stepcard .sc-name { font-weight: 600; font-size: 13.5px; }
.stepcard .sc-jump {
  margin-left: auto; font-size: 11.5px; color: var(--accent);
  background: none; border: 0; font: inherit; cursor: pointer; padding: 0;
}
.stepcard .sc-jump:hover { text-decoration: underline; }
.stepcard .sc-action { color: var(--ink-soft); font-size: 13px; margin: 0; }

.kbdhint {
  margin-top: 12px;
  font-size: 11.5px;
  color: var(--ink-faint);
}
.kbd {
  font-family: var(--mono);
  font-size: 11px;
  border: 1px solid var(--rule-strong);
  border-bottom-width: 2px;
  border-radius: 4px;
  padding: 0 5px;
  background: var(--panel);
  color: var(--ink-soft);
}

/* ---------- view visibility ---------- */
[hidden] { display: none !important; }

/* footer */
footer.site {
  border-top: 1px solid var(--rule);
  color: var(--ink-faint);
  font-size: 12.5px;
  padding: 20px 0 40px;
}
footer.site .wrap { display: flex; gap: 8px 18px; flex-wrap: wrap; align-items: baseline; }
footer.site .gen { font-family: var(--mono); font-size: 11.5px; }

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap; border: 0;
}
</style>
</head>
<body>

<header class="site">
  <div class="wrap">
    <div class="site-row">
      <div class="brand">
        <span class="mark" id="brand-mark">cant<b>us</b></span>
        <span class="ver" id="brand-ver"></span>
        <span class="tagline">Compose LLM agents like polyphony</span>
      </div>
      <div class="viewtoggle" role="tablist" aria-label="View">
        <button id="tab-map" role="tab" aria-selected="true" aria-controls="view-map">Architecture</button>
        <button id="tab-flow" role="tab" aria-selected="false" aria-controls="view-flow">Dataflow</button>
      </div>
      <a class="backlink" href="/">&larr; cantus docs</a>
    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <div class="colmain">

      <!-- LEFT: architecture map (shared between both views) -->
      <section aria-labelledby="map-h">
        <div class="maphead">
          <h2 id="map-h">Architecture</h2>
          <div class="legend" id="legend" aria-label="Card colour legend"></div>
        </div>
        <div class="layers" id="layers"></div>
      </section>

      <!-- RIGHT: rail switches between node detail and scenario stepper -->
      <aside class="rail">
        <!-- Map view: node detail -->
        <div id="view-map" role="tabpanel" aria-labelledby="tab-map">
          <div class="panel-card detail" id="detail">
            <div class="detail-empty">
              <strong>Select a component</strong> from the architecture map to see its
              file path, public symbols, and how it connects to the rest of the framework.
            </div>
          </div>
        </div>

        <!-- Dataflow view: scenario stepper -->
        <div id="view-flow" role="tabpanel" aria-labelledby="tab-flow" hidden>
          <div class="panel-card scen" id="scen">
            <div class="s-head">
              <h3>Dataflow scenarios</h3>
              <div class="scen-select" id="scen-select"></div>
            </div>
            <div class="scen-run" id="scen-run" hidden></div>
          </div>
        </div>
      </aside>

    </div>
  </div>
</main>

<footer class="site">
  <div class="wrap">
    <span id="foot-name"></span>
    <span class="gen" id="foot-gen"></span>
  </div>
</footer>

<!-- knowledge graph data (defines window.CANTUS_GRAPH) -->
<script src="./data/knowledge-graph.js"></script>

<!-- application -->
<script>
(function () {
  "use strict";

  var G = (window.CANTUS_GRAPH && typeof window.CANTUS_GRAPH === "object")
    ? window.CANTUS_GRAPH : {};

  var meta      = G.meta || {};
  var layers    = Array.isArray(G.layers) ? G.layers : [];
  var nodes     = Array.isArray(G.nodes) ? G.nodes : [];
  var edges     = Array.isArray(G.edges) ? G.edges : [];
  var scenarios = Array.isArray(G.scenarios) ? G.scenarios : [];

  // ---- index helpers ----------------------------------------------------
  var nodeById = {};
  nodes.forEach(function (n) { if (n && n.id != null) nodeById[n.id] = n; });

  function nodeLabel(id) {
    var n = nodeById[id];
    return (n && n.label) ? n.label : String(id);
  }
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
  var KIND_LABELS = { protocol: "protocol", hook: "hook", module: "module", core: "core" };
  function kindClass(kind) {
    return KIND_LABELS[kind] ? kind : "module";
  }

  // ---- header / footer --------------------------------------------------
  if (meta.project) {
    // keep the "us" emphasis if the project is literally "cantus"
    var bm = document.getElementById("brand-mark");
    if (meta.project === "cantus") {
      bm.innerHTML = 'cant<b>us</b>';
    } else {
      bm.textContent = meta.project;
    }
  }
  if (meta.version) document.getElementById("brand-ver").textContent = "v" + meta.version;
  else document.getElementById("brand-ver").hidden = true;

  var footName = document.getElementById("foot-name");
  var fnBits = [];
  if (meta.project) fnBits.push(meta.project);
  if (meta.import_name) fnBits.push("import " + meta.import_name);
  if (meta.pypi_name) fnBits.push("pip install " + meta.pypi_name);
  footName.textContent = fnBits.join("  ·  ");
  if (meta.generated_by) document.getElementById("foot-gen").textContent = meta.generated_by;

  // ---- legend (only kinds actually present) -----------------------------
  (function buildLegend() {
    var present = {};
    nodes.forEach(function (n) { if (n) present[kindClass(n.kind)] = true; });
    var order = ["protocol", "hook", "module", "core"];
    var el = document.getElementById("legend");
    order.forEach(function (k) {
      if (!present[k]) return;
      var span = document.createElement("span");
      span.className = "item " + k;
      span.innerHTML = '<span class="swatch" aria-hidden="true"></span>' + esc(k);
      el.appendChild(span);
    });
  })();

  // ---- architecture bands ----------------------------------------------
  var cardEls = {}; // nodeId -> button element

  (function buildLayers() {
    var host = document.getElementById("layers");

    // group nodes by layer id; preserve node order within a layer
    var byLayer = {};
    nodes.forEach(function (n) {
      if (!n) return;
      var lid = n.layer != null ? n.layer : "_";
      (byLayer[lid] = byLayer[lid] || []).push(n);
    });

    // render layers in the given order; append any orphan-layer nodes last
    var seen = {};
    var ordered = layers.slice();
    var extras = Object.keys(byLayer).filter(function (k) {
      return !layers.some(function (l) { return l && l.id === k; });
    });
    extras.forEach(function (k) { ordered.push({ id: k, name: k, blurb: "" }); });

    ordered.forEach(function (layer, i) {
      var lid = layer.id;
      var list = byLayer[lid] || [];
      var band = document.createElement("div");
      band.className = "band";
      band.dataset.layer = lid;

      var head = document.createElement("div");
      head.className = "band-head";
      head.innerHTML =
        '<span class="idx" aria-hidden="true">' + (i + 1) + '</span>' +
        '<span class="name">' + esc(layer.name || lid) + '</span>' +
        (layer.blurb ? '<span class="blurb">' + esc(layer.blurb) + '</span>' : '');
      band.appendChild(head);

      var cards = document.createElement("div");
      cards.className = "cards";
      list.forEach(function (n) {
        var btn = document.createElement("button");
        btn.className = "card";
        btn.type = "button";
        btn.dataset.kind = kindClass(n.kind);
        btn.dataset.node = n.id;
        btn.setAttribute("aria-pressed", "false");
        btn.setAttribute("aria-label",
          (n.label || n.id) + ", " + kindClass(n.kind) +
          (n.blurb ? ". " + n.blurb : ""));
        btn.innerHTML =
          '<span class="ctop">' +
            '<span class="dot" aria-hidden="true"></span>' +
            '<span class="clabel">' + esc(n.label || n.id) + '</span>' +
            '<span class="ckind" aria-hidden="true">' + esc(kindClass(n.kind)) + '</span>' +
          '</span>' +
          (n.blurb ? '<span class="cblurb">' + esc(n.blurb) + '</span>' : '');
        btn.addEventListener("click", function () { selectNode(n.id, true); });
        cards.appendChild(btn);
        cardEls[n.id] = btn;
      });
      band.appendChild(cards);
      host.appendChild(band);
    });
  })();

  // ---- node detail panel ------------------------------------------------
  var detailEl = document.getElementById("detail");
  var currentNode = null;

  function outgoing(id) { return edges.filter(function (e) { return e && e.from === id; }); }
  function incoming(id) { return edges.filter(function (e) { return e && e.to === id; }); }

  function renderDetail(n) {
    var k = kindClass(n.kind);
    var html = '';
    html += '<div class="d-head">';
    html +=   '<div class="d-kindrow">';
    html +=     '<span class="d-dot" style="background:var(--k-' + k + ')" aria-hidden="true"></span>';
    html +=     '<span class="d-kind" style="color:var(--k-' + k + ')">' + esc(k) + '</span>';
    html +=   '</div>';
    html +=   '<h3>' + esc(n.label || n.id) + '</h3>';
    if (n.path) html += '<div class="d-path">' + esc(n.path) + '</div>';
    html += '</div>';

    html += '<div class="d-body">';
    if (n.blurb) html += '<p class="d-blurb">' + esc(n.blurb) + '</p>';

    var syms = Array.isArray(n.symbols) ? n.symbols.filter(Boolean) : [];
    if (syms.length) {
      html += '<div class="d-section-title">Symbols</div>';
      html += '<div class="chips">' +
        syms.map(function (s) { return '<span class="chip">' + esc(s) + '</span>'; }).join('') +
        '</div>';
    }

    var outs = outgoing(n.id);
    if (outs.length) {
      html += '<div class="d-section-title">Connects to</div>';
      html += '<ul class="rels">' + outs.map(function (e) {
        return '<li><button class="rel out" type="button" data-go="' + esc(e.to) + '">' +
          '<span class="arrow" aria-hidden="true">&rarr;</span>' +
          (e.label ? '<span class="verb">' + esc(e.label) + '</span>' : '') +
          '<span class="peer">' + esc(nodeLabel(e.to)) + '</span>' +
        '</button></li>';
      }).join('') + '</ul>';
    }

    var ins = incoming(n.id);
    if (ins.length) {
      html += '<div class="d-section-title">Used by</div>';
      html += '<ul class="rels">' + ins.map(function (e) {
        return '<li><button class="rel in" type="button" data-go="' + esc(e.from) + '">' +
          '<span class="peer">' + esc(nodeLabel(e.from)) + '</span>' +
          (e.label ? '<span class="verb">' + esc(e.label) + '</span>' : '') +
          '<span class="arrow" aria-hidden="true">&rarr;</span>' +
        '</button></li>';
      }).join('') + '</ul>';
    }

    if (!outs.length && !ins.length) {
      html += '<div class="d-section-title">Relationships</div>';
      html += '<div class="rel-empty">No recorded connections.</div>';
    }

    html += '</div>';

    detailEl.innerHTML = html;
    detailEl.querySelectorAll(".rel[data-go]").forEach(function (b) {
      b.addEventListener("click", function () { selectNode(b.getAttribute("data-go"), true); });
    });
  }

  function clearRelatedOutline() {
    Object.keys(cardEls).forEach(function (id) { cardEls[id].classList.remove("is-related"); });
  }

  function selectNode(id, scroll) {
    var n = nodeById[id];
    if (!n) return;
    currentNode = id;

    Object.keys(cardEls).forEach(function (k) {
      cardEls[k].setAttribute("aria-pressed", k === id ? "true" : "false");
    });
    clearRelatedOutline();
    // softly outline directly-connected cards
    outgoing(id).forEach(function (e) { if (cardEls[e.to]) cardEls[e.to].classList.add("is-related"); });
    incoming(id).forEach(function (e) { if (cardEls[e.from]) cardEls[e.from].classList.add("is-related"); });

    renderDetail(n);

    // make sure we're in map view so the user sees the detail
    if (currentView !== "map") setView("map");

    if (scroll && cardEls[id]) {
      var c = cardEls[id];
      var r = c.getBoundingClientRect();
      var headH = document.querySelector("header.site").offsetHeight + 12;
      if (r.top < headH || r.bottom > window.innerHeight) {
        var y = window.pageYOffset + r.top - headH - 8;
        window.scrollTo({ top: y < 0 ? 0 : y });
      }
    }
  }

  // ---- view switching ---------------------------------------------------
  var currentView = "map";
  var tabMap = document.getElementById("tab-map");
  var tabFlow = document.getElementById("tab-flow");
  var viewMap = document.getElementById("view-map");
  var viewFlow = document.getElementById("view-flow");

  function setView(v) {
    currentView = v;
    var isMap = v === "map";
    tabMap.setAttribute("aria-selected", isMap ? "true" : "false");
    tabFlow.setAttribute("aria-selected", isMap ? "false" : "true");
    viewMap.hidden = !isMap;
    viewFlow.hidden = isMap;
    if (isMap) {
      clearStepHighlight();
    } else {
      // entering dataflow: drop node selection highlight, restore active step if any
      Object.keys(cardEls).forEach(function (k) { cardEls[k].setAttribute("aria-pressed", "false"); });
      clearRelatedOutline();
      if (activeScenario != null) highlightStep(false);
    }
  }
  tabMap.addEventListener("click", function () { setView("map"); });
  tabFlow.addEventListener("click", function () { setView("flow"); });

  // ---- scenarios --------------------------------------------------------
  var scenSelect = document.getElementById("scen-select");
  var scenRun = document.getElementById("scen-run");
  var activeScenario = null; // index into scenarios
  var stepIndex = 0;

  (function buildScenarioSelect() {
    if (!scenarios.length) {
      scenSelect.innerHTML = '<div class="rel-empty">No scenarios available.</div>';
      return;
    }
    scenarios.forEach(function (s, i) {
      var btn = document.createElement("button");
      btn.className = "scen-opt";
      btn.type = "button";
      btn.setAttribute("aria-pressed", "false");
      btn.dataset.scen = i;
      btn.innerHTML =
        '<span class="so-title">' + esc(s.title || ("Scenario " + (i + 1))) + '</span>' +
        (s.blurb ? '<span class="so-blurb">' + esc(s.blurb) + '</span>' : '');
      btn.addEventListener("click", function () { selectScenario(i); });
      scenSelect.appendChild(btn);
    });
  })();

  function currentSteps() {
    var s = scenarios[activeScenario];
    return (s && Array.isArray(s.steps)) ? s.steps.filter(Boolean) : [];
  }

  function clearStepHighlight() {
    Object.keys(cardEls).forEach(function (id) { cardEls[id].classList.remove("is-step"); });
  }

  function selectScenario(i) {
    activeScenario = i;
    stepIndex = 0;
    Array.prototype.forEach.call(scenSelect.children, function (c) {
      if (c.dataset) c.setAttribute("aria-pressed", c.dataset.scen === String(i) ? "true" : "false");
    });
    renderScenarioRun();
  }

  function renderScenarioRun() {
    var s = scenarios[activeScenario];
    var steps = currentSteps();
    if (!s) { scenRun.hidden = true; return; }
    scenRun.hidden = false;

    var ticks = steps.map(function (_, k) {
      var cls = k === stepIndex ? "tick now" : (k < stepIndex ? "tick done" : "tick");
      return '<span class="' + cls + '"></span>';
    }).join('');

    var html = '';
    if (s.blurb) html += '<p class="sr-blurb">' + esc(s.blurb) + '</p>';

    if (!steps.length) {
      html += '<div class="rel-empty">This scenario has no steps.</div>';
      scenRun.innerHTML = html;
      clearStepHighlight();
      return;
    }

    html += '<div class="stepper">';
    html +=   '<button id="step-prev" type="button" aria-label="Previous step"' +
              (stepIndex === 0 ? ' disabled' : '') + '>&larr;</button>';
    html +=   '<span class="count">Step <b>' + (stepIndex + 1) + '</b> of ' + steps.length + '</span>';
    html +=   '<button id="step-next" type="button" aria-label="Next step"' +
              (stepIndex === steps.length - 1 ? ' disabled' : '') + '>&rarr;</button>';
    html += '</div>';

    html += '<div class="ticks" aria-hidden="true">' + ticks + '</div>';

    var step = steps[stepIndex];
    var n = nodeById[step.node];
    var k = n ? kindClass(n.kind) : "module";
    html += '<div class="stepcard" aria-live="polite">';
    html +=   '<div class="sc-node">';
    html +=     '<span class="sc-dot" style="background:var(--k-' + k + ')" aria-hidden="true"></span>';
    html +=     '<span class="sc-name">' + esc(n ? (n.label || n.id) : step.node) + '</span>';
    if (n) html += '<button class="sc-jump" type="button" id="step-jump">view in map &rarr;</button>';
    html +=   '</div>';
    html +=   '<p class="sc-action">' + esc(step.action || "") + '</p>';
    html += '</div>';

    html += '<div class="kbdhint"><span class="kbd">&larr;</span> <span class="kbd">&rarr;</span> to step through</div>';

    scenRun.innerHTML = html;

    var prev = document.getElementById("step-prev");
    var next = document.getElementById("step-next");
    if (prev) prev.addEventListener("click", function () { gotoStep(stepIndex - 1); });
    if (next) next.addEventListener("click", function () { gotoStep(stepIndex + 1); });
    var jump = document.getElementById("step-jump");
    if (jump) jump.addEventListener("click", function () {
      // peek the highlighted node in the map without leaving dataflow view selection
      var c = cardEls[step.node];
      if (c) {
        var r = c.getBoundingClientRect();
        var headH = document.querySelector("header.site").offsetHeight + 12;
        var y = window.pageYOffset + r.top - headH - 8;
        window.scrollTo({ top: y < 0 ? 0 : y });
      }
    });

    highlightStep(true);
  }

  function highlightStep(animate) {
    clearStepHighlight();
    var steps = currentSteps();
    var step = steps[stepIndex];
    if (!step) return;
    var c = cardEls[step.node];
    if (!c) return;
    // toggle animation by reflow when stepping
    if (animate) { c.classList.remove("is-step"); void c.offsetWidth; }
    c.classList.add("is-step");
    // ensure visible
    var r = c.getBoundingClientRect();
    var headH = document.querySelector("header.site").offsetHeight + 12;
    if (r.top < headH || r.bottom > window.innerHeight) {
      var y = window.pageYOffset + r.top - headH - 8;
      window.scrollTo({ top: y < 0 ? 0 : y });
    }
  }

  function gotoStep(i) {
    var steps = currentSteps();
    if (i < 0 || i >= steps.length) return;
    stepIndex = i;
    renderScenarioRun();
  }

  // keyboard stepping in dataflow view
  document.addEventListener("keydown", function (e) {
    if (currentView !== "flow" || activeScenario == null) return;
    var t = e.target;
    if (t && (t.tagName === "INPUT" || t.tagName === "TEXTAREA" || t.isContentEditable)) return;
    if (e.key === "ArrowRight") { gotoStep(stepIndex + 1); e.preventDefault(); }
    else if (e.key === "ArrowLeft") { gotoStep(stepIndex - 1); e.preventDefault(); }
  });

  // auto-select first scenario so the dataflow tab is never empty
  if (scenarios.length) selectScenario(0);

})();
</script>
</body>
</html>
