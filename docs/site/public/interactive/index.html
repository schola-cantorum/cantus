<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cantus · Interactive manual</title>
<!--
  Self-contained, zero external network calls. Data is loaded from a sibling
  ./data/knowledge-graph.js global (window.CANTUS_GRAPH) so the file:// launcher
  works offline without fetch(). No web fonts / CDNs — system stacks only.
-->
<style>
  :root {
    --bg: oklch(0.985 0.004 95);
    --paper: oklch(0.995 0.003 95);
    --panel: oklch(0.97 0.005 95);
    --ink: oklch(0.27 0.02 265);
    --muted: oklch(0.52 0.02 265);
    --faint: oklch(0.66 0.015 265);
    --line: oklch(0.89 0.008 265);
    --line-strong: oklch(0.80 0.01 265);
    --accent: oklch(0.58 0.13 255);
    --user: oklch(0.70 0.13 66);
    --protocols: oklch(0.66 0.10 185);
    --runtime: oklch(0.58 0.13 255);
    --substrate: oklch(0.63 0.13 22);
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--sans); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    display: flex; flex-direction: column; overflow: hidden;
  }
  a { color: var(--accent); }

  /* ---- header ---- */
  header.top {
    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    padding: 12px 20px; border-bottom: 1px solid var(--line); background: var(--paper);
  }
  header.top h1 { font-size: 16px; font-weight: 650; margin: 0; letter-spacing: -0.01em; }
  header.top h1 b { color: var(--accent); }
  header.top .sub { font-size: 12.5px; color: var(--muted); }
  header.top .spacer { flex: 1 1 auto; }
  header.top .tools { display: flex; align-items: center; gap: 8px; }

  button, .seg {
    font-family: var(--sans); font-size: 12.5px; color: var(--ink);
    background: var(--paper); border: 1px solid var(--line-strong); border-radius: 7px;
    padding: 5px 10px; cursor: pointer; line-height: 1.2;
  }
  button:hover { border-color: var(--faint); background: var(--panel); }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
  .seg { display: inline-flex; padding: 0; overflow: hidden; }
  .seg button { border: none; border-radius: 0; background: transparent; padding: 5px 11px; }
  .seg button[aria-pressed="true"] { background: var(--accent); color: white; }
  a#back { font-size: 12.5px; padding: 5px 10px; border: 1px solid var(--line-strong); border-radius: 7px; text-decoration: none; }
  a#back:hover { background: var(--panel); }

  /* ---- toolbar ---- */
  .toolbar {
    display: flex; align-items: center; gap: 10px 16px; flex-wrap: wrap;
    padding: 9px 20px; border-bottom: 1px solid var(--line); background: var(--paper);
  }
  .toolbar .group { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .toolbar .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--faint); }
  input.search {
    font-family: var(--sans); font-size: 13px; color: var(--ink);
    border: 1px solid var(--line-strong); border-radius: 7px; padding: 6px 10px; width: 210px;
    background: var(--paper);
  }
  .chip {
    font-size: 12px; border: 1px solid var(--line-strong); border-radius: 999px;
    padding: 3px 11px 3px 9px; cursor: pointer; user-select: none; display: inline-flex;
    align-items: center; gap: 6px; background: var(--paper); color: var(--muted);
  }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; background: currentColor; flex: none; }
  .chip[aria-pressed="true"] { border-color: currentColor; }
  .chip[aria-pressed="false"] { opacity: 0.45; }
  .chip.layer-user { color: color-mix(in oklch, var(--user), var(--ink) 28%); }
  .chip.layer-protocols { color: color-mix(in oklch, var(--protocols), var(--ink) 28%); }
  .chip.layer-runtime { color: color-mix(in oklch, var(--runtime), var(--ink) 24%); }
  .chip.layer-substrate { color: color-mix(in oklch, var(--substrate), var(--ink) 26%); }
  .chip.kind { color: var(--muted); }

  /* ---- main split ---- */
  .main { flex: 1 1 auto; display: grid; grid-template-columns: 1fr 322px; min-height: 0; overflow: hidden; }
  .stage { position: relative; min-width: 0; min-height: 0; overflow: hidden; background:
    radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0 / 26px 26px, var(--bg); }
  svg.graph { width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  svg.graph.panning { cursor: grabbing; }

  .band-label { font: 600 12px var(--sans); letter-spacing: 0.04em; }
  .node { cursor: pointer; }
  .node rect.box { stroke-width: 1.5; transition: opacity .12s; }
  .node text.lbl { font: 600 13px var(--sans); fill: var(--ink); text-anchor: middle; pointer-events: none; }
  .node text.knd { font: 500 10px var(--mono); fill: var(--muted); text-anchor: middle; pointer-events: none; letter-spacing: 0.02em; }
  .edge { fill: none; stroke: var(--line-strong); stroke-width: 1.4; transition: stroke .12s, opacity .12s; }
  .edge.hit { stroke: transparent; stroke-width: 14; cursor: pointer; }
  .dim { opacity: 0.12; }
  .edge.active { stroke: var(--accent); stroke-width: 2.4; }
  .node.active rect.box { stroke-width: 2.6; }
  .node.neighbor rect.box { stroke-width: 2.2; }
  .node.step rect.box { stroke: var(--ink); stroke-width: 2.8; }
  .node.match rect.box { stroke: oklch(0.72 0.16 95); stroke-width: 2.6; }
  .packet { fill: var(--accent); stroke: white; stroke-width: 1.5; }

  /* ---- rail ---- */
  .rail { border-left: 1px solid var(--line); background: var(--paper); overflow-y: auto; min-height: 0; padding: 16px; }
  .rail h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--faint); margin: 0 0 8px; }
  .rail section { margin-bottom: 20px; }
  .d-tag { display: inline-block; font: 600 10.5px var(--mono); padding: 2px 7px; border-radius: 5px; letter-spacing: 0.03em; }
  .d-title { font-size: 17px; font-weight: 650; margin: 8px 0 2px; letter-spacing: -0.01em; }
  .d-path { font: 12px var(--mono); color: var(--muted); word-break: break-all; }
  .d-blurb { font-size: 13.5px; line-height: 1.55; color: oklch(0.36 0.02 265); margin: 10px 0; text-wrap: pretty; }
  .syms { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0 2px; }
  .syms span { font: 11.5px var(--mono); background: var(--panel); border: 1px solid var(--line); border-radius: 5px; padding: 2px 6px; color: var(--muted); }
  .rels { list-style: none; margin: 6px 0 0; padding: 0; }
  .rels li { margin: 3px 0; }
  .rels button.rel { width: 100%; text-align: left; font-size: 12.5px; padding: 5px 8px; display: flex; gap: 6px; align-items: baseline; }
  .rels .rk { font: 10.5px var(--mono); color: var(--faint); flex: none; }
  .rels .rn { font-weight: 600; }

  .legend-row { display: flex; align-items: flex-start; gap: 8px; margin: 7px 0; }
  .legend-row .sw { width: 13px; height: 13px; border-radius: 4px; flex: none; margin-top: 2px; border: 1.5px solid; }
  .legend-row .lt { font-size: 12.5px; }
  .legend-row .lt b { display: block; font-weight: 600; }
  .legend-row .lt span { color: var(--muted); font-size: 11.5px; }
  .stats { display: flex; gap: 16px; font-size: 12.5px; color: var(--muted); }
  .stats b { color: var(--ink); font-size: 15px; font-weight: 650; }

  /* ---- scenario bar ---- */
  .scenario { border-top: 1px solid var(--line); background: var(--paper); padding: 10px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  .scenario .tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .scenario .tabs button[aria-pressed="true"] { background: var(--accent); color: white; border-color: var(--accent); }
  .player { display: flex; align-items: center; gap: 7px; }
  .player .play { font-weight: 600; min-width: 76px; }
  .stepinfo { flex: 1 1 280px; min-width: 200px; font-size: 13px; color: oklch(0.36 0.02 265); }
  .stepinfo .sn { font: 600 11px var(--mono); color: var(--accent); }
  .ticks { display: flex; gap: 4px; }
  .ticks i { width: 22px; height: 5px; border-radius: 3px; background: var(--line-strong); display: block; cursor: pointer; }
  .ticks i.on { background: var(--accent); }
  .ticks i.done { background: color-mix(in oklch, var(--accent), white 50%); }

  footer.foot { padding: 7px 20px; border-top: 1px solid var(--line); background: var(--paper); font-size: 11.5px; color: var(--faint); display: flex; gap: 14px; align-items: center; }

  @media (max-width: 880px) {
    .main { grid-template-columns: 1fr; grid-template-rows: 1fr 240px; }
    .rail { border-left: none; border-top: 1px solid var(--line); }
  }
</style>
</head>
<body>
<header class="top">
  <h1><b>Cantus</b> <span data-i18n="manual">Interactive manual</span></h1>
  <span class="sub" data-i18n="sub">19 nodes · 4 layers · 4 scenarios — the v0.5.0 architecture, explorable</span>
  <span class="spacer"></span>
  <div class="tools">
    <span class="seg" role="group" aria-label="language">
      <button id="lang-en" aria-pressed="true">EN</button>
      <button id="lang-zh" aria-pressed="false">中文</button>
    </span>
    <button id="reset" data-i18n="reset">Reset view</button>
    <a id="back" href="../" data-i18n="back">Documentation site ↗</a>
  </div>
</header>

<div class="toolbar">
  <div class="group">
    <input class="search" id="search" type="search" placeholder="Search nodes…" aria-label="search nodes" />
  </div>
  <div class="group" id="layer-filters" aria-label="layer filters"></div>
  <div class="group" id="kind-filters" aria-label="kind filters"></div>
</div>

<div class="main">
  <div class="stage">
    <svg class="graph" id="graph" aria-label="cantus architecture graph"></svg>
  </div>
  <aside class="rail">
    <section id="detail"></section>
    <section id="legend"></section>
    <section id="stats"></section>
  </aside>
</div>

<div class="scenario">
  <div class="tabs" id="scen-tabs"></div>
  <div class="player">
    <button class="play" id="play">▶ <span data-i18n="play">Play</span></button>
    <button id="prev" aria-label="previous step">◀</button>
    <button id="next" aria-label="next step">▶</button>
    <span class="seg" role="group" aria-label="speed">
      <button id="sp-1" aria-pressed="false">0.5×</button>
      <button id="sp-2" aria-pressed="true">1×</button>
      <button id="sp-3" aria-pressed="false">2×</button>
    </span>
  </div>
  <div class="ticks" id="ticks"></div>
  <div class="stepinfo" id="stepinfo"></div>
</div>

<footer class="foot">
  <span id="meta-line"></span>
  <span style="flex:1"></span>
  <span data-i18n="hint">Drag to pan · scroll to zoom · hover a node to trace its links · play a scenario to watch the dataflow</span>
</footer>

<script src="./data/knowledge-graph.js"></script>
<script>
(function () {
  "use strict";
  var G = window.CANTUS_GRAPH;
  if (!G) { document.body.innerHTML = "<p style='padding:24px'>knowledge-graph.js failed to load.</p>"; return; }

  // ---------- i18n ----------
  var UI = {
    en: { manual: "Interactive manual", sub: "19 nodes · 4 layers · 4 scenarios — the v0.5.0 architecture, explorable",
      reset: "Reset view", back: "Documentation site ↗", search: "Search nodes…", play: "Play", pause: "Pause",
      layers: "Layers", kinds: "Kinds", relOut: "Sends to", relIn: "Receives from", pick: "Pick a node or edge",
      pickBody: "Click a node to see its file, symbols and links — or hover to trace its neighbourhood. Click an edge to see what flows along it.",
      symbols: "Key symbols", edge: "Relation", legend: "Layers", stats: "Graph",
      nodes: "nodes", edges: "edges", scen: "scenarios",
      hint: "Drag to pan · scroll to zoom · hover a node to trace its links · play a scenario to watch the dataflow",
      step: "Step", of: "of" },
    zh: { manual: "互動式手冊", sub: "19 個節點 · 4 層 · 4 個情境——v0.5.0 架構，可探索",
      reset: "重設視角", back: "文件站 ↗", search: "搜尋節點…", play: "播放", pause: "暫停",
      layers: "分層", kinds: "種類", relOut: "送往", relIn: "來自", pick: "選一個節點或連線",
      pickBody: "點一個節點看它的檔案、符號與連線——或滑過去追蹤它的鄰居。點一條連線看上面流的是什麼。",
      symbols: "主要符號", edge: "關係", legend: "分層", stats: "圖譜",
      nodes: "節點", edges: "連線", scen: "情境",
      hint: "拖曳平移 · 滾輪縮放 · 滑過節點追蹤連線 · 播放情境看資料流",
      step: "步驟", of: "／" }
  };
  var lang = "en";
  function ui(k) { return (UI[lang] && UI[lang][k]) || UI.en[k] || k; }
  function tx(o, base) { return (lang === "zh" && o[base + "_zh"]) ? o[base + "_zh"] : o[base]; }

  // ---------- indexes ----------
  var nodeById = {}; G.nodes.forEach(function (n) { nodeById[n.id] = n; });
  var layerOrder = G.layers.map(function (l) { return l.id; });
  var layerById = {}; G.layers.forEach(function (l) { layerById[l.id] = l; });
  function outE(id) { return G.edges.filter(function (e) { return e.from === id; }); }
  function inE(id) { return G.edges.filter(function (e) { return e.to === id; }); }
  function edgeKey(e) { return e.from + ">" + e.to; }

  // ---------- layout ----------
  var GW = 1280, GH = 770, NW = 122, NH = 50;
  var bandY = { user: 78, protocols: 268, runtime: 458, substrate: 658 };
  G.nodes.forEach(function (n) {
    n._x = 92 + (n.col != null ? n.col : 0.5) * (GW - 184);
    n._y = bandY[n.layer] != null ? bandY[n.layer] : 400;
  });

  var SVGNS = "http://www.w3.org/2000/svg";
  function el(tag, attrs) {
    var e = document.createElementNS(SVGNS, tag);
    if (attrs) for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  var svg = document.getElementById("graph");
  svg.setAttribute("viewBox", "0 0 " + GW + " " + GH);

  var defs = el("defs");
  ["m-base", "m-active"].forEach(function (id) {
    var mk = el("marker", { id: id, viewBox: "0 0 10 10", refX: "9", refY: "5",
      markerWidth: "7", markerHeight: "7", orient: "auto-start-reverse" });
    mk.appendChild(el("path", { d: "M0,0 L10,5 L0,10 z",
      fill: id === "m-active" ? "var(--accent)" : "var(--line-strong)" }));
    defs.appendChild(mk);
  });
  svg.appendChild(defs);

  var viewport = el("g", { id: "viewport" });
  svg.appendChild(viewport);
  var gBands = el("g"), gEdges = el("g"), gHits = el("g"), gNodes = el("g"), gPacket = el("g");
  [gBands, gEdges, gHits, gNodes, gPacket].forEach(function (g) { viewport.appendChild(g); });

  // bands
  G.layers.forEach(function (l) {
    var y = bandY[l.id];
    gBands.appendChild(el("rect", { x: 16, y: y - NH / 2 - 16, width: GW - 32, height: NH + 32, rx: 12,
      fill: "color-mix(in oklch, var(--" + l.id + "), transparent 93%)",
      stroke: "color-mix(in oklch, var(--" + l.id + "), transparent 78%)", "stroke-width": 1 }));
    var t = el("text", { x: 26, y: y - NH / 2 - 22, class: "band-label",
      fill: "color-mix(in oklch, var(--" + l.id + "), var(--ink) 30%)" });
    t.dataset.layer = l.id; gBands.appendChild(t);
  });

  function edgePath(e) {
    var a = nodeById[e.from], b = nodeById[e.to];
    var sx = a._x, sy = a._y, tX = b._x, tY = b._y;
    var dy = (tY - sy) * 0.45;
    return "M" + sx + "," + sy + " C" + sx + "," + (sy + dy) + " " + tX + "," + (tY - dy) + " " + tX + "," + tY;
  }
  var edgeEls = {}, hitEls = {};
  G.edges.forEach(function (e) {
    var p = el("path", { class: "edge", d: edgePath(e), "marker-end": "url(#m-base)" });
    gEdges.appendChild(p); edgeEls[edgeKey(e)] = p;
    var hit = el("path", { class: "edge hit", d: edgePath(e) });
    hit.addEventListener("click", function (ev) { ev.stopPropagation(); selectEdge(e); });
    hit.addEventListener("mouseenter", function () { if (idle()) hoverEdge(e); });
    hit.addEventListener("mouseleave", function () { if (idle()) clearHover(); });
    gHits.appendChild(hit); hitEls[edgeKey(e)] = hit;
  });

  // nodes
  var nodeEls = {};
  G.nodes.forEach(function (n) {
    var g = el("g", { class: "node", transform: "translate(" + (n._x - NW / 2) + "," + (n._y - NH / 2) + ")" });
    g.appendChild(el("rect", { class: "box", x: 0, y: 0, width: NW, height: NH, rx: 8,
      fill: "color-mix(in oklch, var(--" + n.layer + "), var(--paper) 84%)",
      stroke: "var(--" + n.layer + ")" }));
    var lbl = el("text", { class: "lbl", x: NW / 2, y: 21 }); lbl.dataset.role = "lbl";
    var knd = el("text", { class: "knd", x: NW / 2, y: 37 }); knd.textContent = n.kind;
    g.appendChild(lbl); g.appendChild(knd);
    g.addEventListener("click", function (ev) { ev.stopPropagation(); selectNode(n.id); });
    g.addEventListener("mouseenter", function () { if (idle()) hoverNode(n.id); });
    g.addEventListener("mouseleave", function () { if (idle()) clearHover(); });
    gNodes.appendChild(g); nodeEls[n.id] = g;
  });

  // ---------- zoom / pan ----------
  var view = { k: 1, x: 0, y: 0 };
  function applyView() { viewport.setAttribute("transform", "translate(" + view.x + "," + view.y + ") scale(" + view.k + ")"); }
  function fit() {
    var r = svg.getBoundingClientRect();
    if (!r.width) return;
    var k = Math.min(r.width / GW, r.height / GH) * 0.95;
    view.k = k; view.x = (r.width - GW * k) / 2; view.y = (r.height - GH * k) / 2; applyView();
  }
  svg.addEventListener("wheel", function (ev) {
    ev.preventDefault();
    var r = svg.getBoundingClientRect();
    var mx = ev.clientX - r.left, my = ev.clientY - r.top;
    var f = Math.exp(-ev.deltaY * 0.0014);
    var nk = Math.max(0.3, Math.min(3.2, view.k * f)); f = nk / view.k;
    view.x = mx - (mx - view.x) * f; view.y = my - (my - view.y) * f; view.k = nk; applyView();
  }, { passive: false });
  var drag = null;
  svg.addEventListener("mousedown", function (ev) {
    if (ev.button !== 0) return; drag = { x: ev.clientX, y: ev.clientY, vx: view.x, vy: view.y };
    svg.classList.add("panning");
  });
  window.addEventListener("mousemove", function (ev) {
    if (!drag) return; view.x = drag.vx + (ev.clientX - drag.x); view.y = drag.vy + (ev.clientY - drag.y); applyView();
  });
  window.addEventListener("mouseup", function () { drag = null; svg.classList.remove("panning"); });
  svg.addEventListener("click", function () { clearSelection(); });

  // ---------- highlight ----------
  function idle() { return !selNode && !selEdge && !playing; }
  function setDimAll(on) {
    G.nodes.forEach(function (n) { nodeEls[n.id].classList.toggle("dim", on); });
    G.edges.forEach(function (e) { edgeEls[edgeKey(e)].classList.toggle("dim", on); });
  }
  function clearMarks() {
    G.nodes.forEach(function (n) { nodeEls[n.id].classList.remove("dim", "active", "neighbor", "step"); });
    G.edges.forEach(function (e) { edgeEls[edgeKey(e)].classList.remove("dim", "active"); });
  }
  function emphasize(id) {
    setDimAll(true);
    nodeEls[id].classList.remove("dim"); nodeEls[id].classList.add("active");
    outE(id).concat(inE(id)).forEach(function (e) {
      var ee = edgeEls[edgeKey(e)]; ee.classList.remove("dim"); ee.classList.add("active");
      ee.setAttribute("marker-end", "url(#m-active)");
      var other = e.from === id ? e.to : e.from;
      nodeEls[other].classList.remove("dim"); nodeEls[other].classList.add("neighbor");
    });
  }
  function resetMarkers() { G.edges.forEach(function (e) { edgeEls[edgeKey(e)].setAttribute("marker-end", "url(#m-base)"); }); }

  var selNode = null, selEdge = null;
  function hoverNode(id) { clearMarks(); resetMarkers(); emphasize(id); }
  function hoverEdge(e) {
    clearMarks(); resetMarkers(); setDimAll(true);
    var ee = edgeEls[edgeKey(e)]; ee.classList.remove("dim"); ee.classList.add("active"); ee.setAttribute("marker-end", "url(#m-active)");
    [e.from, e.to].forEach(function (id) { nodeEls[id].classList.remove("dim"); nodeEls[id].classList.add("neighbor"); });
  }
  function clearHover() { if (!selNode && !selEdge) { clearMarks(); resetMarkers(); applyFilterDim(); } }
  function selectNode(id) { selEdge = null; selNode = id; hoverNode(id); renderDetail(); }
  function selectEdge(e) { selNode = null; selEdge = e; hoverEdge(e); renderDetail(); }
  function clearSelection() { selNode = null; selEdge = null; clearMarks(); resetMarkers(); applyFilterDim(); renderDetail(); }

  // ---------- filters + search ----------
  var activeLayers = {}, activeKinds = {}, query = "";
  layerOrder.forEach(function (l) { activeLayers[l] = true; });
  ["protocol", "hook", "core", "module"].forEach(function (k) { activeKinds[k] = true; });
  function nodeVisible(n) { return activeLayers[n.layer] && activeKinds[n.kind]; }
  function nodeMatch(n) {
    if (!query) return false;
    var q = query.toLowerCase();
    return (n.label + " " + (n.label_zh || "") + " " + n.path + " " + (n.symbols || []).join(" ") + " " + tx(n, "blurb")).toLowerCase().indexOf(q) >= 0;
  }
  function applyFilterDim() {
    G.nodes.forEach(function (n) {
      var g = nodeEls[n.id], vis = nodeVisible(n);
      g.style.display = vis ? "" : "none";
      g.classList.toggle("match", vis && query !== "" && nodeMatch(n));
      g.classList.toggle("dim", vis && query !== "" && !nodeMatch(n));
    });
    G.edges.forEach(function (e) {
      var vis = nodeVisible(nodeById[e.from]) && nodeVisible(nodeById[e.to]);
      edgeEls[edgeKey(e)].style.display = vis ? "" : "none";
      hitEls[edgeKey(e)].style.display = vis ? "" : "none";
      edgeEls[edgeKey(e)].classList.toggle("dim", vis && query !== "");
    });
  }
  function buildFilters() {
    var lw = document.getElementById("layer-filters"); lw.innerHTML = "";
    lw.appendChild(mk("span", "label", ui("layers")));
    G.layers.forEach(function (l) {
      var c = document.createElement("button"); c.className = "chip layer-" + l.id; c.setAttribute("aria-pressed", "true");
      c.appendChild(mk("span", "dot"));
      var t = mk("span"); t.dataset.role = "lname"; t.dataset.layer = l.id; c.appendChild(t);
      c.addEventListener("click", function () { activeLayers[l.id] = !activeLayers[l.id]; c.setAttribute("aria-pressed", String(activeLayers[l.id])); applyFilterDim(); });
      lw.appendChild(c);
    });
    var kw = document.getElementById("kind-filters"); kw.innerHTML = "";
    kw.appendChild(mk("span", "label", ui("kinds")));
    ["protocol", "hook", "core", "module"].forEach(function (k) {
      var c = document.createElement("button"); c.className = "chip kind"; c.setAttribute("aria-pressed", "true"); c.textContent = k;
      c.addEventListener("click", function () { activeKinds[k] = !activeKinds[k]; c.setAttribute("aria-pressed", String(activeKinds[k])); applyFilterDim(); });
      kw.appendChild(c);
    });
  }
  document.getElementById("search").addEventListener("input", function (e) { query = e.target.value.trim(); applyFilterDim(); });

  // ---------- detail panel ----------
  function mk(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }
  function renderDetail() {
    var box = document.getElementById("detail"); box.innerHTML = "";
    if (selNode) {
      var n = nodeById[selNode], L = layerById[n.layer];
      var tag = mk("span", "d-tag", tx(L, "name"));
      tag.style.background = "color-mix(in oklch, var(--" + n.layer + "), transparent 80%)";
      tag.style.color = "color-mix(in oklch, var(--" + n.layer + "), var(--ink) 35%)";
      box.appendChild(tag);
      box.appendChild(mk("div", "d-title", tx(n, "label")));
      box.appendChild(mk("div", "d-path", n.path));
      box.appendChild(mk("div", "d-blurb", tx(n, "blurb")));
      if (n.symbols && n.symbols.length) {
        box.appendChild(mk("h2", null, ui("symbols")));
        var sy = mk("div", "syms"); n.symbols.forEach(function (s) { sy.appendChild(mk("span", null, s)); }); box.appendChild(sy);
      }
      appendRels(box, ui("relOut"), outE(n.id), "to");
      appendRels(box, ui("relIn"), inE(n.id), "from");
    } else if (selEdge) {
      var e = selEdge;
      var tg = mk("span", "d-tag", ui("edge")); tg.style.background = "color-mix(in oklch, var(--accent), transparent 82%)"; tg.style.color = "var(--accent)"; box.appendChild(tg);
      box.appendChild(mk("div", "d-title", tx(e, "label")));
      box.appendChild(mk("div", "d-path", e.kind));
      var flow = mk("div", "d-blurb");
      flow.appendChild(mk("b", null, tx(nodeById[e.from], "label")));
      flow.appendChild(document.createTextNode("  →  "));
      flow.appendChild(mk("b", null, tx(nodeById[e.to], "label")));
      box.appendChild(flow);
    } else {
      box.appendChild(mk("h2", null, ui("pick")));
      box.appendChild(mk("div", "d-blurb", ui("pickBody")));
    }
  }
  function appendRels(box, title, list, dir) {
    if (!list.length) return;
    box.appendChild(mk("h2", null, title));
    var ul = mk("ul", "rels");
    list.forEach(function (e) {
      var other = nodeById[e[dir]];
      var li = document.createElement("li");
      var b = mk("button", "rel");
      b.appendChild(mk("span", "rk", tx(e, "label")));
      b.appendChild(mk("span", "rn", tx(other, "label")));
      b.addEventListener("click", function () { selectNode(other.id); centerOn(other.id); });
      li.appendChild(b); ul.appendChild(li);
    });
    box.appendChild(ul);
  }
  function centerOn(id) {
    var n = nodeById[id], r = svg.getBoundingClientRect();
    view.x = r.width / 2 - n._x * view.k; view.y = r.height / 2 - n._y * view.k; applyView();
  }

  // ---------- legend + stats ----------
  function renderLegendStats() {
    var lg = document.getElementById("legend"); lg.innerHTML = "";
    lg.appendChild(mk("h2", null, ui("legend")));
    G.layers.forEach(function (l) {
      var row = mk("div", "legend-row");
      var sw = mk("span", "sw"); sw.style.background = "color-mix(in oklch, var(--" + l.id + "), var(--paper) 84%)"; sw.style.borderColor = "var(--" + l.id + ")"; row.appendChild(sw);
      var lt = mk("div", "lt"); lt.appendChild(mk("b", null, tx(l, "name"))); lt.appendChild(mk("span", null, tx(l, "blurb"))); row.appendChild(lt);
      lg.appendChild(row);
    });
    var st = document.getElementById("stats"); st.innerHTML = "";
    st.appendChild(mk("h2", null, ui("stats")));
    var row = mk("div", "stats");
    [[G.nodes.length, "nodes"], [G.edges.length, "edges"], [G.scenarios.length, "scen"]].forEach(function (pair) {
      var d = document.createElement("div"); d.appendChild(mk("b", null, pair[0])); d.appendChild(document.createTextNode(" " + ui(pair[1]))); row.appendChild(d);
    });
    st.appendChild(row);
  }

  // ---------- scenario player ----------
  var scenIdx = 0, stepIdx = 0, playing = false, speed = 1, timer = null, anim = null;
  function steps() { return G.scenarios[scenIdx].steps; }
  function buildScenTabs() {
    var w = document.getElementById("scen-tabs"); w.innerHTML = "";
    G.scenarios.forEach(function (s, i) {
      var b = document.createElement("button"); b.dataset.role = "scen"; b.dataset.i = i;
      b.setAttribute("aria-pressed", String(i === scenIdx));
      b.addEventListener("click", function () { stop(); scenIdx = i; stepIdx = 0; refreshScen(); showStep(false); });
      w.appendChild(b);
    });
  }
  function refreshScen() {
    Array.prototype.forEach.call(document.getElementById("scen-tabs").children, function (b) {
      b.setAttribute("aria-pressed", String(+b.dataset.i === scenIdx));
      b.textContent = tx(G.scenarios[+b.dataset.i], "title");
    });
    buildTicks();
  }
  function buildTicks() {
    var w = document.getElementById("ticks"); w.innerHTML = "";
    steps().forEach(function (_, i) {
      var t = document.createElement("i"); t.dataset.i = i;
      t.addEventListener("click", function () { stop(); stepIdx = i; showStep(true); });
      w.appendChild(t);
    });
  }
  function paintTicks() {
    Array.prototype.forEach.call(document.getElementById("ticks").children, function (t, i) {
      t.classList.toggle("on", i === stepIdx); t.classList.toggle("done", i < stepIdx);
    });
  }
  function showStep(animate) {
    var s = steps()[stepIdx];
    if (selNode || selEdge) { selNode = null; selEdge = null; renderDetail(); }
    clearMarks(); resetMarkers(); setDimAll(true);
    var nid = s.node; nodeEls[nid].classList.remove("dim"); nodeEls[nid].classList.add("step");
    if (stepIdx > 0) {
      var prev = steps()[stepIdx - 1].node;
      var found = findEdge(prev, nid);
      if (found) {
        var ee = edgeEls[edgeKey(found.e)]; ee.classList.remove("dim"); ee.classList.add("active"); ee.setAttribute("marker-end", "url(#m-active)");
        nodeEls[prev].classList.remove("dim"); nodeEls[prev].classList.add("neighbor");
        if (animate) runPacket(found);
      }
    }
    paintTicks();
    var info = document.getElementById("stepinfo"); info.innerHTML = "";
    info.appendChild(mk("span", "sn", ui("step") + " " + (stepIdx + 1) + " " + ui("of") + " " + steps().length + " · " + tx(nodeById[nid], "label") + "  "));
    info.appendChild(document.createTextNode(tx(s, "action")));
  }
  function findEdge(a, b) {
    for (var i = 0; i < G.edges.length; i++) {
      var e = G.edges[i];
      if (e.from === a && e.to === b) return { e: e, rev: false };
      if (e.from === b && e.to === a) return { e: e, rev: true };
    }
    return null;
  }
  function runPacket(found) {
    cancelPacket();
    var path = edgeEls[edgeKey(found.e)];
    var len = path.getTotalLength();
    var dot = el("circle", { class: "packet", r: 5 }); gPacket.appendChild(dot);
    var dur = 850 / speed, t0 = null;
    function frame(ts) {
      if (t0 == null) t0 = ts;
      var p = Math.min(1, (ts - t0) / dur);
      var at = found.rev ? (1 - p) : p;
      var pt = path.getPointAtLength(at * len);
      dot.setAttribute("cx", pt.x); dot.setAttribute("cy", pt.y);
      if (p < 1) anim = requestAnimationFrame(frame); else { if (dot.parentNode) gPacket.removeChild(dot); anim = null; }
    }
    anim = requestAnimationFrame(frame);
  }
  function cancelPacket() { if (anim) { cancelAnimationFrame(anim); anim = null; } gPacket.innerHTML = ""; }
  function play() {
    if (selNode || selEdge) clearSelection();
    playing = true; setPlayLabel(); tick();
  }
  function tick() {
    showStep(true);
    timer = setTimeout(function () {
      if (stepIdx < steps().length - 1) { stepIdx++; tick(); } else { stop(); }
    }, 1500 / speed);
  }
  function stop() { playing = false; if (timer) { clearTimeout(timer); timer = null; } cancelPacket(); setPlayLabel(); }
  function setPlayLabel() {
    var b = document.getElementById("play");
    b.textContent = playing ? "❚❚ " + ui("pause") : "▶ " + ui("play");
  }
  document.getElementById("play").addEventListener("click", function () { if (playing) stop(); else { if (stepIdx >= steps().length - 1) stepIdx = 0; play(); } });
  document.getElementById("prev").addEventListener("click", function () { stop(); stepIdx = Math.max(0, stepIdx - 1); showStep(true); });
  document.getElementById("next").addEventListener("click", function () { stop(); stepIdx = Math.min(steps().length - 1, stepIdx + 1); showStep(true); });
  [["sp-1", 0.5], ["sp-2", 1], ["sp-3", 2]].forEach(function (p) {
    document.getElementById(p[0]).addEventListener("click", function () {
      speed = p[1];
      ["sp-1", "sp-2", "sp-3"].forEach(function (id) { document.getElementById(id).setAttribute("aria-pressed", String(id === p[0])); });
    });
  });

  // ---------- language ----------
  function applyLang() {
    document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
    document.getElementById("lang-en").setAttribute("aria-pressed", String(lang === "en"));
    document.getElementById("lang-zh").setAttribute("aria-pressed", String(lang === "zh"));
    document.querySelectorAll("[data-i18n]").forEach(function (e) { e.textContent = ui(e.getAttribute("data-i18n")); });
    document.getElementById("search").placeholder = ui("search");
    G.nodes.forEach(function (n) { nodeEls[n.id].querySelector('[data-role="lbl"]').textContent = tx(n, "label"); });
    gBands.querySelectorAll("text.band-label").forEach(function (t) { t.textContent = tx(layerById[t.dataset.layer], "name"); });
    document.querySelectorAll('[data-role="lname"]').forEach(function (s) { s.textContent = tx(layerById[s.dataset.layer], "name"); });
    var ll = document.querySelector("#layer-filters .label"); if (ll) ll.textContent = ui("layers");
    var kl = document.querySelector("#kind-filters .label"); if (kl) kl.textContent = ui("kinds");
    document.getElementById("meta-line").textContent = "cantus " + G.meta.version + " · " + G.meta.pypi_name;
    setPlayLabel(); refreshScen(); renderLegendStats(); renderDetail(); showStep(false);
  }
  document.getElementById("lang-en").addEventListener("click", function () { stop(); lang = "en"; applyLang(); });
  document.getElementById("lang-zh").addEventListener("click", function () { stop(); lang = "zh"; applyLang(); });
  document.getElementById("reset").addEventListener("click", function () { clearSelection(); document.getElementById("search").value = ""; query = ""; applyFilterDim(); fit(); });

  // ---------- boot ----------
  buildFilters(); buildScenTabs();
  applyLang(); applyFilterDim();
  fit();
  setTimeout(fit, 60);
})();
</script>
</body>
</html>
