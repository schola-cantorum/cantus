name: research
version: 1.0.0
min_core_schema_version: 1.0.0
required_dirs:
  - research
  - coding_style
  - architecture
  - future_work
page_frontmatter_schema:
  type: object
  required:
    - name
    - description
    - topic
  additionalProperties: true
  properties:
    name:
      type: string
      minLength: 1
    description:
      type: string
      minLength: 1
    topic:
      type: string
      enum:
        - research
        - coding_style
        - architecture
        - future_work
    sources:
      type: array
      items:
        type: object
log_format_strict: false
